<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kern County Museum — AR</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <script async src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
  <script async src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
</head>
<body class="ar-page">

  <!-- Loading / Onboarding Screen -->
  <div id="onboarding" class="onboarding">
    <div class="onboarding-content">
      <div class="onboarding-logo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="20" width="48" height="36" rx="2" stroke="currentColor" stroke-width="2.5"/>
          <path d="M8 28h48" stroke="currentColor" stroke-width="2.5"/>
          <path d="M20 20V12a12 12 0 0 1 24 0v8" stroke="currentColor" stroke-width="2.5"/>
          <circle cx="32" cy="24" r="2" fill="currentColor"/>
        </svg>
      </div>
      <h1 id="onboarding-station-name" class="onboarding-title">Loading Station...</h1>
      <p id="onboarding-station-year" class="onboarding-year"></p>

      <div id="loading-spinner" class="loading-spinner">
        <div class="spinner"></div>
        <p class="loading-text" id="loading-text">Initializing camera...</p>
      </div>

      <div id="onboarding-instructions" class="onboarding-instructions" style="display:none;">
        <div class="instruction-step">
          <div class="instruction-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="3" width="20" height="18" rx="2"/>
              <circle cx="12" cy="12" r="4"/>
            </svg>
          </div>
          <p id="instruction-text">Point your phone at the marker on the building</p>
        </div>
        <button id="btn-start-ar" class="btn-primary" onclick="window.arApp.startExperience()">
          Begin Experience
        </button>
      </div>
    </div>
  </div>

  <!-- AR Container -->
  <div id="ar-container" class="ar-container"></div>

  <!-- HUD Overlay -->
  <div id="hud" class="hud" style="display:none;">
    <!-- Top bar -->
    <div class="hud-top">
      <button class="hud-btn" id="btn-back" onclick="window.location.href='index.html'" title="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="hud-station-info">
        <span id="hud-station-name" class="hud-station-name"></span>
        <span id="hud-station-year" class="hud-station-year"></span>
      </div>
      <button class="hud-btn" id="btn-audio-toggle" onclick="window.arApp.toggleAudio()" title="Toggle Audio">
        <svg id="icon-audio-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
        </svg>
        <svg id="icon-audio-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15"/>
          <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
      </button>
    </div>

    <!-- Tracking indicator -->
    <div id="tracking-indicator" class="tracking-indicator">
      <div class="tracking-dot"></div>
      <span id="tracking-text">Searching for marker...</span>
    </div>

    <!-- Bottom controls -->
    <div class="hud-bottom">
      <button class="hud-btn-circle" id="btn-info" onclick="window.arApp.toggleInfoCards()" title="Info">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
      </button>
      <button class="hud-btn-circle" id="btn-video" onclick="window.arApp.toggleVideo()" title="Video">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </button>
      <button class="hud-btn-circle" id="btn-reset" onclick="window.arApp.resetView()" title="Reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Info Card Detail Panel (full-screen overlay) -->
  <div id="info-detail" class="info-detail" style="display:none;">
    <div class="info-detail-backdrop" onclick="window.arApp.closeInfoDetail()"></div>
    <div class="info-detail-card">
      <button class="info-detail-close" onclick="window.arApp.closeInfoDetail()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <img id="info-detail-image" class="info-detail-image" src="" alt="">
      <h2 id="info-detail-title" class="info-detail-title"></h2>
      <p id="info-detail-body" class="info-detail-body"></p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/content-loader.js"></script>
  <script src="js/audio-manager.js"></script>
  <script src="js/info-cards.js"></script>
  <script src="js/video-panel.js"></script>
  <script src="js/ui-controller.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
